<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="popup.css">
  <!-- Import Outfit and Inter Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo-area">
        <span class="logo-icon">🔁</span>
        <h1 class="logo-title">Gemini Chat Saver</h1>
      </div>
      <span class="badge" id="chat-count">0 Chats</span>
    </header>

    <main class="content">
      <button id="btn-open-dashboard" class="btn btn-primary">
        <span>View History Dashboard</span>
        <span class="btn-icon">🚀</span>
      </button>

      <section class="recent-section">
        <h2 class="section-title">Recent Backups</h2>
        <div id="recent-list" class="recent-list">
          <div class="loading">Loading database...</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span id="sync-status">Local storage active</span>
    </footer>
  </div>

  <script src="lib/dexie.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
